<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Pong Game</h1>
        <div class="scoreboard">
            <div class="score">
                <span class="label">Player</span>
                <span class="value" id="playerScore">0</span>
            </div>
            <div class="score">
                <span class="label">Computer</span>
                <span class="value" id="computerScore">0</span>
            </div>
        </div>
        
        <div class="game-board" id="gameBoard">
            <div class="center-line"></div>
            <div class="paddle player-paddle" id="playerPaddle"></div>
            <div class="paddle computer-paddle" id="computerPaddle"></div>
            <div class="ball" id="ball"></div>
        </div>
        
        <div class="instructions">
            <p><strong>Controls:</strong></p>
            <p>Mouse: Move paddle up/down</p>
            <p>Arrow Keys: Move paddle up/down</p>
            <p>First to 5 points wins!</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
