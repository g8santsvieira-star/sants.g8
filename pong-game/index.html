<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>PONG</h1>
        <div class="scoreboard">
            <div class="player-score">
                <span class="label">Player</span>
                <span class="score" id="playerScore">0</span>
            </div>
            <div class="divider">-</div>
            <div class="computer-score">
                <span class="label">Computer</span>
                <span class="score" id="computerScore">0</span>
            </div>
        </div>
        
        <div class="game-info">
            <p id="gameStatus">Use ARROW KEYS or MOUSE to move the left paddle</p>
        </div>

        <canvas id="pongCanvas" width="800" height="400"></canvas>

        <div class="instructions">
            <p><strong>Controls:</strong> Arrow Keys (UP/DOWN) or Mouse Movement</p>
            <p><strong>Goal:</strong> Bounce the ball past the computer's paddle to score</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
